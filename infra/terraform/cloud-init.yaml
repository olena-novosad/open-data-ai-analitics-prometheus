#cloud-config
package_upgrade: true

packages:
  - git
  - curl

runcmd:
  - curl -fsSL https://get.docker.com -o get-docker.sh
  - sh get-docker.sh
  - systemctl enable --now docker
  - systemctl start docker

  - mkdir -p /usr/local/lib/docker/cli-plugins/
  - curl -SL https://github.com/docker/compose/releases/download/v2.20.2/docker-compose-linux-x86_64 -o /usr/local/lib/docker/cli-plugins/docker-compose
  - chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

  - docker --version
  - docker compose version

  - mkdir -p /app
  - git clone ${repo_url} /app

  - |
    cat > /app/docker/.env <<EOF
    POSTGRES_DB=analytics_db
    POSTGRES_USER=postgres
    POSTGRES_PASSWORD=postgres
    POSTGRES_HOST=db
    POSTGRES_PORT=5432
    WEB_PORT=80
    EOF

  # Спочатку підіймаємо основний застосунок
  - cd /app/docker && docker compose up -d
  # Даємо час на створення мережі та бази
  - sleep 10
  # Потім підіймаємо стек моніторингу
  - cd /app/monitoring && docker compose -f docker-compose.monitoring.yml up -d