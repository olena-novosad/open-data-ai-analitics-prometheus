#cloud-config
package_upgrade: true

packages:
  - git
  - curl

runcmd:
  # 1. Встановлення Docker та Docker Compose V2 (стабільний метод для Ubuntu 20.04)
  - apt-get update
  - apt-get install -y docker.io
  - systemctl enable --now docker

  # Встановлюємо Docker Compose як плагін
  - mkdir -p /usr/local/lib/docker/cli-plugins/
  - curl -SL https://github.com/docker/compose/releases/download/v2.26.1/docker-compose-linux-x86_64 -o /usr/local/lib/docker/cli-plugins/docker-compose
  - chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

  # 2. Підготовка папки проєкту
  - mkdir -p /app
  - git clone ${repo_url} /app
  - chown -R azureuser:azureuser /app

  # 3. Створення .env файлу за вірним шляхом
  - |
    cat > /app/docker/.env <<EOF
    POSTGRES_DB=analytics_db
    POSTGRES_USER=postgres
    POSTGRES_PASSWORD=postgres
    POSTGRES_HOST=db
    POSTGRES_PORT=5432
    WEB_PORT=80
    EOF

  # 4. Запуск основного застосунку
  - cd /app/docker && docker compose up -d

  # Даємо базі даних та мережі час на ініціалізацію
  - sleep 15

  - cd /app/monitoring && docker compose -f docker-compose.monitoring.yml up -d

final_message: "The system is finally up, after all the debugging!"